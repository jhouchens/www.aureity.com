    <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/icons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/svg"
      sizes="32x32"
      href="assets/icons/favicon-32x32.svg"
    />
    <link
      rel="icon"
      type="image/svg"
      sizes="16x16"
      href="assets/icons/favicon-16x16.svg"
    />

    <title>Welcome to Aureity</title>

  <body>
    <!-- Navbar -->
    <nav class="nav-bar">
        <!-- Logo -->  
        <a href="#" class="logo">
            <div class="logo-icon">
                <div class="logo-circle"></div>
                <div class="logo-bead"></div>
            </div>
            <div class="logo-text">
                <span class="logo-text1">Aureity</span>
 <!--               <span class="logo-text2">Incorporated</span>  -->
            </div>
        </a>
     <!-- Menu Items -->   
        <ul class="nav-menu">
            <li class="nav-item">
            <a href="about" class="nav-link" id="nav-link">Who we are</a>
            </li>
            <li class="nav-item">
            <a href="our-work" class="nav-link" id="nav-link">What we do</a>
            </li>
            <li class="nav-item">
            <a href="contact" class="nav-link" id="nav-link"
                >Contact us</a>
            </li>
        </ul>

     <!-- Dark/light theme switcher -->       
       <div class="theme-switch">
            <input type="checkbox" class="checkbox" id="checkbox" />
            <label for="checkbox" class="label">
                <ion-icon name="sunny-outline" class="sun"></ion-icon>
                <ion-icon name="moon-outline" class="moon"></ion-icon>
                <div class="switcher"></div>
            </label>
        </div>

      <!-- Hamburger menu -->
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div> 
    </nav>

    <section id="hero-section" class="hero-section">

      <div id="hero-box" class="hero-box">
        <ion-button class="hero-box-close-btn">
          <ion-icon slot="icon-only" size="large" name="close-circle-outline"></ion-icon>
        </ion-button>
        <div id="hero-content" class="hero-content"></div>
      </div>

    </section>
